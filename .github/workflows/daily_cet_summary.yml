name: Daily CET Trading Summary to Discord

on:
  schedule:
    - cron: '5 21 * * 1-5'
  workflow_dispatch: {}

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Prague

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Prague trading window
        id: dates
        run: |
          START=$(TZ="Europe/Prague" date -d "yesterday 00:00" +"%Y-%m-%dT%H:%M:%S")
          END=$(TZ="Europe/Prague" date -d "today 00:00" +"%Y-%m-%dT%H:%M:%S")
          PRETTY=$(TZ="Europe/Prague" date -d "yesterday" +"%b %d, %Y")

          echo "start=$START" >> $GITHUB_OUTPUT
          echo "end=$END" >> $GITHUB_OUTPUT
          echo "pretty=$PRETTY" >> $GITHUB_OUTPUT

      - name: Fetch data from Base44
        run: |
          mkdir -p tmp

            curl -s -H "api_key: ${{ secrets.BASE44_API_KEY }}" \
          "https://app.base44.com/api/apps/6921d8e3ab33f86e081375a1/entities/Trade?limit=999999" \
          -o tmp/trades.json

            curl -s -H "api_key: ${{ secrets.BASE44_API_KEY }}" \
          "https://app.base44.com/api/apps/6921d8e3ab33f86e081375a1/entities/MasterTrade?limit=999999" \
          -o tmp/master.json

            curl -s -H "api_key: ${{ secrets.BASE44_API_KEY }}" \
          "https://app.base44.com/api/apps/6921d8e3ab33f86e081375a1/entities/TradeLeg?limit=999999" \
          -o tmp/legs.json

            curl -s -H "api_key: ${{ secrets.BASE44_API_KEY }}" \
            "https://app.base44.com/api/apps/6921d8e3ab33f86e081375a1/entities/RealizedLegProfit?limit=999999" \
            -o tmp/realized.json
        
      - name: Debug trades data
        run: |
          echo "Total trades:"
          jq length tmp/trades.json || jq '.items | length' tmp/trades.json

          echo "Recent trades:"
          jq '.[] | {ticker, open_date, close_date}' tmp/trades.json | head -20 || \
          jq '.items[] | {ticker, open_date, close_date}' tmp/trades.json | head -20

      - name: Build daily metrics & lists
        id: build
        run: |
          set -e
          USER_EMAIL="retirehustler@gmail.com"

          normalize () {
            FILE=$1
            if jq -e 'type=="array"' "$FILE" >/dev/null; then
              cat "$FILE"
            else
              jq -c '.items // []' "$FILE"
            fi
          }

          ITEMS=$(normalize tmp/trades.json | jq 'map(select(.created_by == "'"$USER_EMAIL"'"))')

          MASTER=$(normalize tmp/master.json | jq 'map(select(.created_by == "'"$USER_EMAIL"'"))')

          # Load all legs and realized first
          LEGS_ALL=$(normalize tmp/legs.json)
          REALIZED_ALL=$(normalize tmp/realized.json)    

          # Extract allowed master IDs
          MASTER_IDS=$(echo "$MASTER" | jq '[.[].id]')

          # Filter LEGS to only your master trades
          LEGS=$(echo "$LEGS_ALL" | jq \
            --argjson mids "$MASTER_IDS" \
            'map(select(.master_id as $mid | $mids | index($mid)))'
            )

          # Filter REALIZED to only your master trades
          REALIZED=$(echo "$REALIZED_ALL" | jq \
            --argjson mids "$MASTER_IDS" \
            'map(select(.master_trade_id as $mid | $mids | index($mid)))'
            )
          # Filter REALIZED trades inside Prague time window
          TODAY_REALIZED=$(echo "$REALIZED" | jq \
            --arg start "${{ steps.dates.outputs.start }}" \
            --arg end "${{ steps.dates.outputs.end }}" '
            map(select(
            (.realization_date | split("T")[0]) == ($start | split("T")[0])
            ))
            ')
          ########################################
          # SIMPLE CLOSED TRADES (UNCHANGED)
          ########################################
          CLOSED_JSON=$(echo "$ITEMS" | jq \
            --arg start "${{ steps.dates.outputs.start }}" \
            --arg end "${{ steps.dates.outputs.end }}" '
            map(select(
            (.close_date | split("T")[0]) == ($start | split("T")[0])
            ))
            ')

          CLOSED_SIMPLE_LINES=$(echo "$CLOSED_JSON" | jq -r '
          .[]
          | (if .direction=="BUY" then "Sell to Close" else "Buy to Close" end) as $action
          | (.quantity|tostring) as $qty
          | .ticker as $ticker
          | .type as $type
          | (
            if ($type=="Call" or $type=="Put")
            then (.strike_price|tostring)
            else (.strike_price|tostring) + "/" + (.strike_price_2|tostring)
            end
            ) as $strikes
          | $action + " " + $qty + " " + $ticker
          + " – " + $type + " " + $strikes
          + " → $" + (.profit_loss|tostring)
          ')

          ########################################
          # CONSTRUCTED CLOSED LEGS (UPDATED)
          ########################################
          

          CLOSED_CONSTRUCTED_LINES=$(echo "$TODAY_REALIZED" | jq -r \
            --argjson legs "$LEGS" \
            --argjson master "$MASTER" '
            .[]
              | . as $r
           | ($master | map(select(.id == $r.master_trade_id)) | .[0]) as $m
          | select($m != null)
          | ($legs | map(select(.id == $r.trade_leg_id)) | .[0]) as $leg
          | (if $leg.direction=="SELL" then "Buy to Close" else "Sell to Close" end) as $action
          | ($leg.type | if .=="Call" then "C" else "P" end) as $cp
          | "\($r.ticker) – \($m.strategy)\n\($action) \($leg.strike_price) \($cp) for $\($r.realized_pl) profit"
          ')

          CLOSED_LINES=$(printf "%s\n%s" "$CLOSED_SIMPLE_LINES" "$CLOSED_CONSTRUCTED_LINES" | sed '/^[[:space:]]*$/d')
          [ -z "$CLOSED_LINES" ] && CLOSED_LINES="(no closed trades today)"

          ########################################
          # SIMPLE OPEN TRADES (UNCHANGED)
          ########################################
          OPEN_SIMPLE_LINES=$(echo "$ITEMS" | jq \
            --arg start "${{ steps.dates.outputs.start }}" \
            --arg end "${{ steps.dates.outputs.end }}" '
            map(select(
            (.open_date | split("T")[0]) == ($start | split("T")[0])
            ))
          | .[]
          | (if .direction=="BUY" then "Buy to Open" else "Sell to Open" end) as $action
          | (.quantity|tostring) as $qty
          | .ticker as $ticker
          | .type as $type
          | (
          if ($type=="Call" or $type=="Put")
          then (.strike_price|tostring)
          else (.strike_price|tostring) + "/" + (.strike_price_2|tostring)
          end
          ) as $strikes
          | $action + " " + $qty + " " + $ticker + " – " + $type + " " + $strikes
          + " Exp " + (.expiration_date|tostring)
          ')

          ########################################
          # CONSTRUCTED OPEN TRADES (UPDATED)
          ########################################
          OPEN_CONSTRUCTED_LINES=$(echo "$MASTER" | jq \
            --arg start "${{ steps.dates.outputs.start }}" \
            --arg end "${{ steps.dates.outputs.end }}" \
            --argjson legs "$LEGS" '
            map(select((.open_date >= $start) and (.open_date < $end)))
            | .[]
            | . as $m
            | ($legs | map(select(.master_id == $m.id))) as $legs_for_master
            | ($legs_for_master
                | map(
                    (if .direction=="BUY" then "Buy " else "Sell " end)
                    + (.strike_price|tostring)
                    + " "
                    + (if .type=="Call" then "C" else "P" end)
                  )
                | join(" / ")
              ) as $legs_txt
            | ($legs_for_master | map(.expiration_date) | unique) as $exps
            | ($exps | if length==1 then .[0] else join(" / ") end) as $exp_txt
            | "Open " + $m.ticker + " – " + $m.strategy + " – " + $legs_txt + " – Exp " + $exp_txt
          ')

          OPEN_LINES=$(printf "%s\n%s" "$OPEN_SIMPLE_LINES" "$OPEN_CONSTRUCTED_LINES" | sed '/^[[:space:]]*$/d')
          [ -z "$OPEN_LINES" ] && OPEN_LINES="(no opened trades today)"

          ########################################
          # DAILY P/L
          ########################################
          PL_SIMPLE=$(echo "$CLOSED_JSON" | jq '[.[].profit_loss // 0] | add // 0')
          PL_CONSTRUCTED=$(echo "$TODAY_REALIZED" | jq '[.[].realized_pl // 0] | add // 0')

          DAILY_PL=$(jq -n '
            ($a + $b) | (. * 100 | round) / 100 | "$" + tostring
          ' --argjson a "$PL_SIMPLE" --argjson b "$PL_CONSTRUCTED")

          echo "daily_pl=$DAILY_PL" >> $GITHUB_OUTPUT
          echo "closed_list=$(printf "%s" "$CLOSED_LINES" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')" >> $GITHUB_OUTPUT
          echo "open_list=$(printf "%s" "$OPEN_LINES" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')" >> $GITHUB_OUTPUT

      - name: Send Discord message
        env:
          DISCORD_WEBHOOK: ${{ secrets.DAILY_DISCORD_WEBHOOK_URL }}
          PRETTY: ${{ steps.dates.outputs.pretty }}
          DAILY_PL: ${{ steps.build.outputs.daily_pl }}
          CLOSED_JSON: ${{ steps.build.outputs.closed_list }}
          OPEN_JSON: ${{ steps.build.outputs.open_list }}
        run: |
          python3 <<'PY'
          import json, os, subprocess

          payload = {
            "embeds": [{
              "title": f"📊 Daily Trading Summary – {os.environ['PRETTY']}",
              "color": 3447003,
              "fields": [
                { "name": "💰 Daily Closed P&L", "value": f"**{os.environ['DAILY_PL']}**", "inline": False },
                { "name": "✅ Closed Today", "value": json.loads(os.environ["CLOSED_JSON"]), "inline": False },
                { "name": "📂 Opened Today", "value": json.loads(os.environ["OPEN_JSON"]), "inline": False }
              ],
              "footer": { "text": "RetireHustler Options Edge" }
            }]
          }

          subprocess.run(
            ["curl", "-s", "-H", "Content-Type: application/json",
             "-d", json.dumps(payload), os.environ["DISCORD_WEBHOOK"]],
            check=True
          )
          PY
